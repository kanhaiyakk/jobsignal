services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ji-postgres
    environment:
      POSTGRES_DB: jobsignal
      POSTGRES_USER: jobsignal
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobsignal"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
