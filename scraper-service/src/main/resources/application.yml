spring:
  application:
    name: scraper-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

scraper:
  remoteok:
    base-url: ${REMOTEOK_BASE_URL:https://remoteok.com}
    timeout-seconds: ${REMOTEOK_TIMEOUT_SECONDS:10}
