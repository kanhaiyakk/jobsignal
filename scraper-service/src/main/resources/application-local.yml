spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jobsignal
    username: jobsignal
    password: localdev
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.jobsignal: DEBUG
    org.springframework.web: INFO
