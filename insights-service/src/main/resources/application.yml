spring:
  application:
    name: insights-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/jobsignal}
    username: ${DATASOURCE_USERNAME:jobsignal}
    password: ${DATASOURCE_PASSWORD:localdev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: insights-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.jobsignal.*"
        spring.json.value.default.type: "com.jobsignal.shared.event.EnrichedListingEvent"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    admin:
      fail-fast: false
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: ${SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

kafka:
  topics:
    enriched-listings: enriched-listings
    insights-generated: insights-generated
    failed-listings: failed-listings

gemini:
  api-key: ${GEMINI_API_KEY:changeme}
  base-url: https://generativelanguage.googleapis.com
  chat-model: gemini-2.5-flash

insights:
  lookback-days: 7
  report-cron: "0 0 8 * * MON"

resilience4j:
  retry:
    instances:
      gemini:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - com.jobsignal.insights.exception.InsightException
  circuitbreaker:
    instances:
      gemini:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
